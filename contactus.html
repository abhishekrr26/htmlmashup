<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
</head>
<body>
<div style="text-align: center;">  
  <h1>Contact Us</h1>
  <p>If you have any questions or inquiries, please feel free to reach out to us:</p>
<form action="submit_contact.php" method="post">
    <fieldset>
      <legend>Contact Information:</legend>
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required placeholder="Your Name"><br><br>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required placeholder="Your Email Address"><br><br>
      <label for="p1">Phone Number:</label>
      <input type="tel" id="p1" name="phone" required placeholder="Your Phone Number"><br><br>
      <label for="message">Subject:</label>
      <select id="message" name="message" required>
        <option value="e1">Enquiry</option>
        <option value="s1">Support</option>
        <option value="f1">Feedback</option>
      </select><br><br>
      <label for="message">Message:</label><br>
      <textarea id="message" name="message" rows="4" cols="50" required placeholder="Your Message"></textarea><br><br>

      <input type="submit" value="Submit"><br><br>
      &copy; 2026 Contact Us. All rights reserved.

    </fieldset>
</form> 
</div>
</body>
</html>
